<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RESILIENTES MC GUANAJUATO | REAL DE CATORCE</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--blue:#3aa0ff;
--dark:#050505;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
overflow-x:hidden;
font-family:Montserrat,sans-serif;
}

.hero{

height:100vh;
position:relative;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=2000&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

.hero::before{

content:'';
position:absolute;
inset:0;

background:
radial-gradient(circle at center,
rgba(58,160,255,.20),
transparent 50%);

animation:pulse 6s infinite;
}

@keyframes pulse{

0%{opacity:.4;}
50%{opacity:1;}
100%{opacity:.4;}

}

.content{

position:relative;
z-index:5;
width:95%;
max-width:1400px;

}

.logo{

width:260px;
max-width:75%;
margin-bottom:20px;

filter:
drop-shadow(0 0 10px rgba(58,160,255,.8))
drop-shadow(0 0 30px rgba(58,160,255,.4));

}

.club{

font-family:Cinzel,serif;
letter-spacing:8px;
font-size:.95rem;
color:var(--gold);

}

.title{

font-family:Cinzel,serif;
font-weight:800;
font-size:clamp(3rem,10vw,7rem);
margin-top:15px;
text-shadow:0 0 30px rgba(0,0,0,.8);

}

.subtitle{

font-size:clamp(1rem,3vw,1.6rem);
letter-spacing:4px;
margin-bottom:40px;
opacity:.9;

}

.countdown{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:45px;

}

.card{

background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,.15);

padding:25px;

border-radius:20px;

min-width:170px;

box-shadow:
0 0 20px rgba(0,0,0,.4),
0 0 30px rgba(58,160,255,.15);

}

.number{

font-size:4rem;
font-weight:700;
color:white;

}

.label{

letter-spacing:5px;
color:var(--gold);

}

.quote{

max-width:900px;
margin:auto;

font-size:clamp(1.2rem,3vw,1.8rem);

line-height:1.6;

font-style:italic;

margin-bottom:25px;

}

.motto{

font-family:Cinzel,serif;
letter-spacing:4px;
color:var(--gold);

margin-bottom:40px;

}

.date{

opacity:.6;
letter-spacing:5px;

}

.footerline{

position:absolute;
bottom:20px;
left:0;
right:0;

font-size:.9rem;
opacity:.5;

}

#arrival{

display:none;

height:100vh;

justify-content:center;
align-items:center;

flex-direction:column;

background:
linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.95));

text-align:center;

}

#arrival img{

width:300px;
max-width:80%;

filter:
drop-shadow(0 0 20px rgba(58,160,255,.8));

}

.arrive-title{

font-family:Cinzel,serif;
font-size:clamp(3rem,9vw,7rem);

margin-top:30px;

color:var(--gold);

}

.arrive-sub{

font-size:clamp(1.2rem,4vw,2rem);

letter-spacing:6px;

margin-top:15px;

}

</style>
</head>

<body>

<section class="hero" id="hero">

<div class="content">

<img src="logo.png" class="logo">

<div class="club">
RESILIENTES MC GUANAJUATO
</div>

<div class="title">
REAL DE CATORCE
</div>

<div class="subtitle">
RODADA 2026
</div>

<div class="countdown">

<div class="card">
<div id="days" class="number">0</div>
<div class="label">DÍAS</div>
</div>

<div class="card">
<div id="hours" class="number">0</div>
<div class="label">HORAS</div>
</div>

<div class="card">
<div id="minutes" class="number">0</div>
<div class="label">MINUTOS</div>
</div>

<div class="card">
<div id="seconds" class="number">0</div>
<div class="label">SEGUNDOS</div>
</div>

</div>

<div class="quote">
"No contamos los kilómetros que faltan...
contamos las historias que aún nos esperan."
</div>

<div class="motto">
⚜ FORTUNA ADIUVAT FORTES ⚜
</div>

<div class="date">
14 NOVIEMBRE 2026 · 06:00 HRS
</div>

</div>

<div class="footerline">
RESILIENTES MC GUANAJUATO
</div>

</section>

<section id="arrival">

<img src="logo.png">

<div class="arrive-title">
LA ESPERA TERMINÓ
</div>

<div class="arrive-sub">
ARRANQUEN MOTORES
</div>

</section>

<script>

const target =
new Date("2026-11-14T06:00:00");

function update(){

const now = new Date();

const diff = target - now;

if(diff <= 0){

document.getElementById('hero').style.display='none';
document.getElementById('arrival').style.display='flex';

return;

}

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff/(1000*60*60))%24);
const minutes=Math.floor((diff/(1000*60))%60);
const seconds=Math.floor((diff/1000)%60);

document.getElementById('days').textContent=days;
document.getElementById('hours').textContent=hours;
document.getElementById('minutes').textContent=minutes;
document.getElementById('seconds').textContent=seconds;

}

update();
setInterval(update,1000);

</script>

</body>
</html>
